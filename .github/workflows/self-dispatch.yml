# Self workflow for AI Dispatch — used by ace-assistant repository itself
# Replace ace-aiagent/ace-assistant with your actual org/repo path for the ace-assistant repository.
#
# This caller handles event listening (issues, comments, PRs) and delegates the
# triage/routing logic to the reusable dispatch workflow. After the reusable workflow
# determines the route (fix or review), this caller dispatches the appropriate workflow.

name: AI Dispatch

on:
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]
  pull_request:
    types: [reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      target_type:
        description: 'Target type: issue or pr'
        required: true
        type: choice
        options: [issue, pr]
      target_number:
        description: 'Issue or PR number'
        required: true
        type: string
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options: [fix, review]
      extra_prompt:
        description: 'Additional instructions'
        required: false
        type: string
        default: ''
      force:
        description: 'Force reset state before running'
        required: false
        type: string
        default: 'false'

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: write

concurrency:
  group: >-
    ace-dispatch-${{
      github.event.issue.number
      || github.event.pull_request.number
      || inputs.target_number
      || github.run_id
    }}
  cancel-in-progress: false

jobs:
  dispatch:
    uses: ace-aiagent/ace-assistant/.github/workflows/reusable-dispatch.yml@v1
    with:
      event_name: ${{ github.event_name }}
      target_type: ${{ inputs.target_type || '' }}
      target_number: ${{ inputs.target_number || '' }}
      action: ${{ inputs.action || '' }}
      extra_prompt: ${{ inputs.extra_prompt || '' }}
      force: ${{ inputs.force || 'false' }}
      event_json: ${{ toJSON(github.event) }}
    secrets:
      OPENCODE_AUTH_JSON_B64: ${{ secrets.OPENCODE_AUTH_JSON_B64 }}
      GH_PAT: ${{ secrets.GH_PAT }}
      BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}

  route-fix:
    needs: dispatch
    if: needs.dispatch.outputs.route_to == 'fix'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch fix workflow
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
          ROUTE_PARAMS: ${{ needs.dispatch.outputs.route_params }}
        shell: bash
        run: |
          set -euo pipefail

          RAW_ROUTE_PARAMS="${ROUTE_PARAMS:-}"
          SAFE_ROUTE_PARAMS='{}'
          PARSE_OK=false

          # Try parse: direct object -> stringified JSON -> double-stringified JSON
          if [[ -n "$RAW_ROUTE_PARAMS" ]] && jq -e 'type == "object"' >/dev/null 2>&1 <<< "$RAW_ROUTE_PARAMS"; then
            SAFE_ROUTE_PARAMS="$RAW_ROUTE_PARAMS"
            PARSE_OK=true
            echo "::debug::route_params parsed as direct object"
          elif [[ -n "$RAW_ROUTE_PARAMS" ]] && jq -e 'type == "string"' >/dev/null 2>&1 <<< "$RAW_ROUTE_PARAMS"; then
            INNER="$(jq -r '.' <<< "$RAW_ROUTE_PARAMS")"
            if jq -e 'type == "object"' >/dev/null 2>&1 <<< "$INNER"; then
              SAFE_ROUTE_PARAMS="$INNER"
              PARSE_OK=true
              echo "::debug::route_params parsed as stringified JSON"
            elif jq -e 'type == "string"' >/dev/null 2>&1 <<< "$INNER"; then
              DOUBLE_INNER="$(jq -r '.' <<< "$INNER")"
              if jq -e 'type == "object"' >/dev/null 2>&1 <<< "$DOUBLE_INNER"; then
                SAFE_ROUTE_PARAMS="$DOUBLE_INNER"
                PARSE_OK=true
                echo "::debug::route_params parsed as double-stringified JSON"
              fi
            fi
          fi

          if [[ "$PARSE_OK" != "true" ]]; then
            echo "::warning::route_params is not a valid JSON object, fallback to {}"
          fi

          TARGET_TYPE="$(jq -r '.target_type // "issue"' <<< "$SAFE_ROUTE_PARAMS")"
          TARGET_NUMBER="$(jq -r '.target_number' <<< "$SAFE_ROUTE_PARAMS")"

          # Unified guard: validate target_number is not empty
          if [[ -z "$TARGET_NUMBER" ]]; then
            echo "::error::target_number is empty after parsing route_params"
            exit 1
          fi

          AUTO_LOOP="$(jq -r '.auto_loop // "true"' <<< "$SAFE_ROUTE_PARAMS")"
          EXTRA_PROMPT="$(jq -r '.extra_prompt // ""' <<< "$SAFE_ROUTE_PARAMS")"
          TRIAGE_JSON="$(jq -c '.triage_json // ""' <<< "$SAFE_ROUTE_PARAMS")"
          FORCE="$(jq -r '.force // "false"' <<< "$SAFE_ROUTE_PARAMS")"

          gh workflow run self-fix.yml \
            --repo "$REPO" \
            -f target_type="$TARGET_TYPE" \
            -f target_number="$TARGET_NUMBER" \
            -f auto_loop="$AUTO_LOOP" \
            -f extra_prompt="$EXTRA_PROMPT" \
            -f triage_json="$TRIAGE_JSON" \
            -f force="$FORCE"

          echo "::notice::Dispatched ace-fix for $TARGET_TYPE #$TARGET_NUMBER"

  route-review:
    needs: dispatch
    if: needs.dispatch.outputs.route_to == 'review'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch review workflow
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
          ROUTE_PARAMS: ${{ needs.dispatch.outputs.route_params }}
        shell: bash
        run: |
          set -euo pipefail

          RAW_ROUTE_PARAMS="${ROUTE_PARAMS:-}"
          SAFE_ROUTE_PARAMS='{}'
          PARSE_OK=false

          # Debug: show what we received
          echo "::debug::RAW_ROUTE_PARAMS length: ${#RAW_ROUTE_PARAMS}"
          echo "::debug::RAW_ROUTE_PARAMS preview: ${RAW_ROUTE_PARAMS:0:200}"

          # Try parse: direct object -> stringified JSON -> double-stringified JSON
          if [[ -n "$RAW_ROUTE_PARAMS" ]] && jq -e 'type == "object"' >/dev/null 2>&1 <<< "$RAW_ROUTE_PARAMS"; then
            SAFE_ROUTE_PARAMS="$RAW_ROUTE_PARAMS"
            PARSE_OK=true
            echo "::debug::route_params parsed as direct object"
          elif [[ -n "$RAW_ROUTE_PARAMS" ]] && jq -e 'type == "string"' >/dev/null 2>&1 <<< "$RAW_ROUTE_PARAMS"; then
            INNER="$(jq -r '.' <<< "$RAW_ROUTE_PARAMS")"
            if jq -e 'type == "object"' >/dev/null 2>&1 <<< "$INNER"; then
              SAFE_ROUTE_PARAMS="$INNER"
              PARSE_OK=true
              echo "::debug::route_params parsed as stringified JSON"
            elif jq -e 'type == "string"' >/dev/null 2>&1 <<< "$INNER"; then
              DOUBLE_INNER="$(jq -r '.' <<< "$INNER")"
              if jq -e 'type == "object"' >/dev/null 2>&1 <<< "$DOUBLE_INNER"; then
                SAFE_ROUTE_PARAMS="$DOUBLE_INNER"
                PARSE_OK=true
                echo "::debug::route_params parsed as double-stringified JSON"
              fi
            fi
          fi

          if [[ "$PARSE_OK" != "true" ]]; then
            echo "::warning::route_params is not a valid JSON object, fallback to {}"
          fi

          PR_NUMBER="$(jq -r '.pr_number // .target_number // empty' <<< "$SAFE_ROUTE_PARAMS")"

          # Unified guard: validate pr_number is not empty
          if [[ -z "$PR_NUMBER" ]]; then
            echo "::error::pr_number is empty after parsing route_params"
            exit 1
          fi

          AUTO_LOOP="$(jq -r '.auto_loop // "true"' <<< "$SAFE_ROUTE_PARAMS")"
          EXTRA_PROMPT="$(jq -r '.extra_prompt // ""' <<< "$SAFE_ROUTE_PARAMS")"
          FORCE="$(jq -r '.force // "false"' <<< "$SAFE_ROUTE_PARAMS")"

          gh workflow run self-review.yml \
            --repo "$REPO" \
            -f pr_number="$PR_NUMBER" \
            -f auto_loop="$AUTO_LOOP" \
            -f extra_prompt="$EXTRA_PROMPT" \
            -f force="$FORCE"

          echo "::notice::Dispatched ace-review for PR #$PR_NUMBER"
