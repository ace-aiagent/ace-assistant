# Composite action: common bootstrap steps for AI worker workflows.
# Handles dual checkout: business repo + ace-assistant repo.
name: AI Worker Bootstrap
description: Checkout repos, setup Python/uv, OpenCode auth, git identity, and PYTHONPATH

inputs:
  opencode-auth-b64:
    description: Base64-encoded OpenCode auth.json content
    required: true
  ace-assistant-repo:
    description: "ace-assistant repository in owner/repo format"
    required: false
    default: "ace0-uai/ace-assistant"
  ace-assistant-ref:
    description: "ace-assistant ref to checkout (tag, branch, or SHA)"
    required: false
    default: "v1"

runs:
  using: composite
  steps:
    - name: Checkout business repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: true

    - name: Checkout ace-assistant
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.ace-assistant-repo }}
        ref: ${{ inputs.ace-assistant-ref }}
        path: .ace-assistant

    - name: Set PYTHONPATH for CI scripts
      shell: bash
      run: echo "PYTHONPATH=${{ github.workspace }}/.ace-assistant" >> "$GITHUB_ENV"

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Setup OpenCode
      uses: ./.ace-assistant/.github/actions/setup-opencode
      with:
        opencode-auth-b64: ${{ inputs.opencode-auth-b64 }}

    - name: Configure git identity
      uses: ./.ace-assistant/.github/actions/configure-git
