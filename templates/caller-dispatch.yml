# Caller workflow for AI Dispatch — place in your repo's .github/workflows/ace-dispatch.yml
# Replace ORG/ace-assistant with your actual org/repo path for the ace-assistant repository.
#
# This caller handles event listening (issues, comments, PRs) and delegates the
# triage/routing logic to the reusable dispatch workflow. After the reusable workflow
# determines the route (fix or review), this caller dispatches the appropriate workflow.

name: AI Dispatch

on:
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]
  pull_request:
    types: [reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      target_type:
        description: 'Target type: issue or pr'
        required: true
        type: choice
        options: [issue, pr]
      target_number:
        description: 'Issue or PR number'
        required: true
        type: string
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options: [fix, review]
      extra_prompt:
        description: 'Additional instructions'
        required: false
        type: string
        default: ''
      force:
        description: 'Force reset state before running'
        required: false
        type: string
        default: 'false'

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: write

concurrency:
  group: >-
    ace-dispatch-${{
      github.event.issue.number
      || github.event.pull_request.number
      || inputs.target_number
      || github.run_id
    }}
  cancel-in-progress: false

jobs:
  dispatch:
    uses: ORG/ace-assistant/.github/workflows/ace-dispatch.yml@v1
    with:
      event_name: ${{ github.event_name }}
      target_type: ${{ inputs.target_type || '' }}
      target_number: ${{ inputs.target_number || '' }}
      action: ${{ inputs.action || '' }}
      extra_prompt: ${{ inputs.extra_prompt || '' }}
      force: ${{ inputs.force || 'false' }}
      event_json: ${{ toJSON(github.event) }}
    secrets:
      OPENCODE_AUTH_JSON_B64: ${{ secrets.OPENCODE_AUTH_JSON_B64 }}
      GH_PAT: ${{ secrets.GH_PAT }}

  route-fix:
    needs: dispatch
    if: needs.dispatch.outputs.route_to == 'fix'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}
      REPO: ${{ github.repository }}
      TARGET_TYPE: ${{ fromJSON(needs.dispatch.outputs.route_params).target_type || 'issue' }}
      TARGET_NUMBER: ${{ fromJSON(needs.dispatch.outputs.route_params).target_number }}
      AUTO_LOOP: ${{ fromJSON(needs.dispatch.outputs.route_params).auto_loop || 'true' }}
      EXTRA_PROMPT: ${{ fromJSON(needs.dispatch.outputs.route_params).extra_prompt || '' }}
      TRIAGE_JSON: ${{ toJSON(fromJSON(needs.dispatch.outputs.route_params).triage_json || '') }}
      FORCE: ${{ fromJSON(needs.dispatch.outputs.route_params).force || 'false' }}
    steps:
      - name: Dispatch fix workflow
        shell: bash
        run: |
          set -euo pipefail

          gh workflow run ace-fix.yml \
            --repo "$REPO" \
            -f target_type="$TARGET_TYPE" \
            -f target_number="$TARGET_NUMBER" \
            -f auto_loop="$AUTO_LOOP" \
            -f extra_prompt="$EXTRA_PROMPT" \
            -f triage_json="$TRIAGE_JSON" \
            -f force="$FORCE"

          echo "::notice::Dispatched ace-fix for $TARGET_TYPE #$TARGET_NUMBER"

  route-review:
    needs: dispatch
    if: needs.dispatch.outputs.route_to == 'review'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ fromJSON(needs.dispatch.outputs.route_params).pr_number || fromJSON(needs.dispatch.outputs.route_params).target_number }}
      AUTO_LOOP: ${{ fromJSON(needs.dispatch.outputs.route_params).auto_loop || 'true' }}
      EXTRA_PROMPT: ${{ fromJSON(needs.dispatch.outputs.route_params).extra_prompt || '' }}
      FORCE: ${{ fromJSON(needs.dispatch.outputs.route_params).force || 'false' }}
    steps:
      - name: Dispatch review workflow
        shell: bash
        run: |
          set -euo pipefail

          gh workflow run ace-review.yml \
            --repo "$REPO" \
            -f pr_number="$PR_NUMBER" \
            -f auto_loop="$AUTO_LOOP" \
            -f extra_prompt="$EXTRA_PROMPT" \
            -f force="$FORCE"

          echo "::notice::Dispatched ace-review for PR #$PR_NUMBER"
