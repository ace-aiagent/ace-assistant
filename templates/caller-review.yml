# Caller workflow for AI Review — place in your repo's .github/workflows/ace-review.yml
# Replace ORG/ace-assistant with your actual org/repo path for the ace-assistant repository.

name: AI Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: string
      auto_loop:
        description: 'Whether to auto-dispatch fix workflow after changes requested'
        required: false
        type: string
        default: "true"
      extra_prompt:
        description: 'Additional user instructions for the AI reviewer'
        required: false
        type: string
        default: ""
      force:
        description: 'Force reset PR state before review'
        required: false
        type: string
        default: "false"

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: write

concurrency:
  group: ace-review-${{ inputs.pr_number }}
  cancel-in-progress: false

jobs:
  review:
    uses: ORG/ace-assistant/.github/workflows/ace-review.yml@v1
    with:
      pr_number: ${{ inputs.pr_number }}
      auto_loop: ${{ inputs.auto_loop }}
      extra_prompt: ${{ inputs.extra_prompt }}
      force: ${{ inputs.force }}
    secrets:
      OPENCODE_AUTH_JSON_B64: ${{ secrets.OPENCODE_AUTH_JSON_B64 }}
      GH_PAT: ${{ secrets.GH_PAT }}

  trigger-fix:
    needs: review
    if: needs.review.outputs.needs_fix == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch fix workflow
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
          FIX_PARAMS: ${{ needs.review.outputs.fix_params }}
        shell: bash
        run: |
          set -euo pipefail

          RAW_FIX_PARAMS="${FIX_PARAMS:-}"
          SAFE_FIX_PARAMS='{}'
          PARSE_OK=false

          # Try parse: direct object -> stringified JSON -> double-stringified JSON
          if [[ -n "$RAW_FIX_PARAMS" ]] && jq -e 'type == "object"' >/dev/null 2>&1 <<< "$RAW_FIX_PARAMS"; then
            SAFE_FIX_PARAMS="$RAW_FIX_PARAMS"
            PARSE_OK=true
            echo "::debug::fix_params parsed as direct object"
          elif [[ -n "$RAW_FIX_PARAMS" ]] && jq -e 'type == "string"' >/dev/null 2>&1 <<< "$RAW_FIX_PARAMS"; then
            INNER="$(jq -r '.' <<< "$RAW_FIX_PARAMS")"
            if jq -e 'type == "object"' >/dev/null 2>&1 <<< "$INNER"; then
              SAFE_FIX_PARAMS="$INNER"
              PARSE_OK=true
              echo "::debug::fix_params parsed as stringified JSON"
            elif jq -e 'type == "string"' >/dev/null 2>&1 <<< "$INNER"; then
              DOUBLE_INNER="$(jq -r '.' <<< "$INNER")"
              if jq -e 'type == "object"' >/dev/null 2>&1 <<< "$DOUBLE_INNER"; then
                SAFE_FIX_PARAMS="$DOUBLE_INNER"
                PARSE_OK=true
                echo "::debug::fix_params parsed as double-stringified JSON"
              fi
            fi
          fi

          if [[ "$PARSE_OK" != "true" ]]; then
            echo "::warning::fix_params is not a valid JSON object, fallback to {}"
          fi

          TARGET_TYPE="$(jq -r '.target_type // "pr"' <<< "$SAFE_FIX_PARAMS")"
          TARGET_NUMBER="$(jq -r '.target_number' <<< "$SAFE_FIX_PARAMS")"

          # Unified guard: validate target_number is not empty
          if [[ -z "$TARGET_NUMBER" ]]; then
            echo "::error::target_number is empty after parsing fix_params"
            exit 1
          fi

          EXTRA_PROMPT="$(jq -r '.extra_prompt // ""' <<< "$SAFE_FIX_PARAMS")"

          gh workflow run ace-fix.yml \
            --repo "$REPO" \
            -f target_type="$TARGET_TYPE" \
            -f target_number="$TARGET_NUMBER" \
            -f auto_loop="true" \
            -f extra_prompt="$EXTRA_PROMPT" \
            -f force="false"

          echo "::notice::Dispatched ace-fix for $TARGET_TYPE #$TARGET_NUMBER"
